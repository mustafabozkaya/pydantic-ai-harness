name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request: {}

env:
  UV_FROZEN: '1'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: '3.14'
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
          cache-suffix: lint

      - run: uv sync --frozen --all-groups --all-extras

      - uses: pre-commit/action@646c83fcd040023954eafda54b4db0192ce70507 # v3.0.0
        with:
          extra_args: --all-files --verbose
        env:
          SKIP: no-commit-to-branch

      - run: make typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        install:
          - name: slim
            extras: ''
          - name: all-extras
            extras: '--all-extras'
    name: test on ${{ matrix.python-version }} (${{ matrix.install.name }})
    env:
      COVERAGE_FILE: coverage-data/.coverage.${{ matrix.python-version }}-${{ matrix.install.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions

      - run: uv sync --frozen --group dev ${{ matrix.install.extras }}
      - run: mkdir -p coverage-data
      - run: uv run coverage run -m pytest
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.install.name }}
          path: coverage-data/.coverage.*
          include-hidden-files: true

  # Verify the harness still works against the lowest pydantic-ai-slim version we
  # claim compatibility with (the `>=` floor in pyproject.toml). The default `test`
  # matrix above resolves against the lock (= latest published satisfying our
  # constraints); this job exercises the actual floor. Bleeding-edge compat with
  # pydantic-ai's main branch is verified by pydantic-ai's `harness compat` job
  # (see https://github.com/pydantic/pydantic-ai/blob/main/.github/workflows/harness-compat.yml).
  test-floor:
    runs-on: ubuntu-latest
    name: test on floor pydantic-ai-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: '3.14'
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
          cache-suffix: floor

      # Install all transitive deps from the lock first, then override slim to the floor
      # version read from pyproject.toml. `--no-deps` keeps everything else lock-pinned;
      # the floor only needs to pin slim itself. Reading from pyproject.toml keeps the
      # floor as a single source of truth — bumping it there auto-updates this job.
      - run: uv sync --frozen --group dev --all-extras
      - name: Install pydantic-ai-slim at documented floor
        run: |
          set -euo pipefail
          FLOOR=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          for dep in data['project']['dependencies']:
              if dep.startswith('pydantic-ai-slim>='):
                  print(dep.split('>=', 1)[1])
                  break
          else:
              raise SystemExit('Could not find pydantic-ai-slim>= constraint in pyproject.toml')
          ")
          echo "Testing against pydantic-ai-slim floor: $FLOOR"
          uv pip install --no-deps "pydantic-ai-slim==$FLOOR"
      - run: uv run --no-sync pytest

  coverage:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: '3.14'
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: coverage-*
          path: coverage-data
          merge-multiple: true

      - run: uv sync --frozen --group dev --all-extras
      - run: uv run coverage combine coverage-data
      - run: uv run coverage report

  check:
    if: always()
    needs: [lint, test, test-floor, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

  release:
    needs: [check]
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: '3.14'
          enable-cache: false

      - run: uv build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
